# notify-snapshot-consumers.yml  [AUTO-28]
# ---------------------------------------------------------------------------
# Event-driven snapshot sync — SENDER side (myPKA, the OSS source of truth).
#
# When the Expansions/ tree changes on `main`, this fires a repository_dispatch
# event at github.com/TomSolid/myicor, which carries a bundled byte-identical
# copy of Expansions/ at src/apps/courses/workshop/data/mypka-scaffold-snapshot/.
# The receiving workflow (sync-mypka-snapshot.yml in myicor) checks myPKA out
# at the exact SHA below, rsyncs, and opens a drift PR.
#
# This decouples myicor's snapshot freshness from myPKA's public release
# cadence — no manual double-edit, no waiting for a release tag.
#
# CREDENTIAL: needs repo secret MYPKA_SYNC_TOKEN — a fine-grained PAT (or
# GitHub App token) with permission to trigger workflows / dispatch events on
# TomSolid/myicor. Until that secret exists this workflow's dispatch step
# fails fast and harmlessly (it changes nothing in either repo). See
# docs/SOP-mypka-snapshot-sync.md in the myicor repo for the exact setup spec.
# ---------------------------------------------------------------------------
name: Notify snapshot consumers

on:
  push:
    branches: [main]
    paths:
      - 'Expansions/**'
  # Manual escape hatch — re-send the dispatch for the current main HEAD.
  workflow_dispatch:

# Never run two dispatches concurrently; a later push supersedes an in-flight one.
concurrency:
  group: notify-snapshot-consumers
  cancel-in-progress: true

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Guard — credential present
        env:
          SYNC_TOKEN: ${{ secrets.MYPKA_SYNC_TOKEN }}
        run: |
          if [ -z "$SYNC_TOKEN" ]; then
            echo "::error::Repo secret MYPKA_SYNC_TOKEN is not set."
            echo "::error::Add it before this workflow can dispatch to myicor."
            echo "::error::Setup spec: myicor repo docs/SOP-mypka-snapshot-sync.md"
            exit 1
          fi
          echo "MYPKA_SYNC_TOKEN present — proceeding."

      - name: Send repository_dispatch to TomSolid/myicor
        env:
          SYNC_TOKEN: ${{ secrets.MYPKA_SYNC_TOKEN }}
          SOURCE_SHA: ${{ github.sha }}
          SOURCE_REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          echo "Dispatching mypka-expansions-changed for myPKA@${SOURCE_SHA}"
          http_code=$(curl -sS -o /tmp/dispatch-resp.txt -w '%{http_code}' \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${SYNC_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/TomSolid/myicor/dispatches \
            -d "{\"event_type\":\"mypka-expansions-changed\",\"client_payload\":{\"source_sha\":\"${SOURCE_SHA}\",\"source_ref\":\"${SOURCE_REF}\"}}")
          echo "GitHub API responded HTTP ${http_code}"
          if [ "$http_code" != "204" ]; then
            echo "::error::Dispatch failed (expected HTTP 204). Response body:"
            cat /tmp/dispatch-resp.txt || true
            echo "::error::Check MYPKA_SYNC_TOKEN scopes — needs contents:write on TomSolid/myicor."
            exit 1
          fi
          echo "Dispatch accepted. myicor sync-mypka-snapshot.yml will now run."
